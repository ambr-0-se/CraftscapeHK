steps:
  # Build the backend container image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'gcr.io/$PROJECT_ID/craftscape-backend:$COMMIT_SHA'
      - '-t'
      - 'gcr.io/$PROJECT_ID/craftscape-backend:latest'
      - '-f'
      - 'server/Dockerfile'
      - './server'
    id: 'build-backend-image'

  # Build the frontend container image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'gcr.io/$PROJECT_ID/craftscape-frontend:$COMMIT_SHA'
      - '-t'
      - 'gcr.io/$PROJECT_ID/craftscape-frontend:latest'
      - '-f'
      - 'Dockerfile'
      - '.'
    id: 'build-frontend-image'

  # Push the backend container image to Container Registry
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'gcr.io/$PROJECT_ID/craftscape-backend:$COMMIT_SHA'
    id: 'push-backend-image'

  # Push the frontend container image to Container Registry
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'gcr.io/$PROJECT_ID/craftscape-frontend:$COMMIT_SHA'
    id: 'push-frontend-image'

  # Deploy backend container to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'craftscape-backend'
      - '--image'
      - 'gcr.io/$PROJECT_ID/craftscape-backend:$COMMIT_SHA'
      - '--region'
      - 'us-central1'
      - '--platform'
      - 'managed'
      - '--allow-unauthenticated'
      - '--set-env-vars'
      - 'GEMINI_API_KEY=${_GEMINI_API_KEY}'
      - '--memory'
      - '512Mi'
      - '--cpu'
      - '1'
      - '--timeout'
      - '300s'
      - '--max-instances'
      - '10'
    id: 'deploy-backend'

  # Deploy frontend container to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'craftscape-frontend'
      - '--image'
      - 'gcr.io/$PROJECT_ID/craftscape-frontend:$COMMIT_SHA'
      - '--region'
      - 'us-central1'
      - '--platform'
      - 'managed'
      - '--allow-unauthenticated'
      - '--memory'
      - '256Mi'
      - '--cpu'
      - '1'
      - '--timeout'
      - '60s'
      - '--max-instances'
      - '10'
    id: 'deploy-frontend'

  # Wait for backend deployment to be ready and seed the database
  - name: 'gcr.io/cloud-builders/gcloud'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        echo "Waiting for backend service to be ready..."
        sleep 10
        
        echo "Getting backend service URL..."
        BACKEND_URL=$(gcloud run services describe craftscape-backend --region us-central1 --format="value(status.url)")
        echo "Backend URL: $BACKEND_URL"
        
        echo "Seeding database..."
        curl -X POST "$BACKEND_URL/admin/seed" \
          -H "Content-Type: application/json" \
          --fail \
          --show-error \
          --retry 3 \
          --retry-delay 5 \
          -v
        
        echo "Database seeding completed!"
    id: 'wait-and-seed'

images:
  - 'gcr.io/$PROJECT_ID/craftscape-backend:$COMMIT_SHA'
  - 'gcr.io/$PROJECT_ID/craftscape-backend:latest'
  - 'gcr.io/$PROJECT_ID/craftscape-frontend:$COMMIT_SHA'
  - 'gcr.io/$PROJECT_ID/craftscape-frontend:latest'

options:
  machineType: 'E2_HIGHCPU_8'
  logging: CLOUD_LOGGING_ONLY

timeout: '1200s'
